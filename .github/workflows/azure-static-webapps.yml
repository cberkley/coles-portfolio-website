name: Deploy to Azure

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build_and_deploy_swa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: /client
          output_location: dist
          skip_api_build: true   # Functions deployed separately

  build_and_deploy_functions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Build & Publish
        run: dotnet publish functions/PortfolioFunctions/PortfolioFunctions.csproj -c Release -o ./publish

      - name: Deploy Functions
        uses: Azure/functions-action@v1
        with:
          app-name: cole-portfolio-functions
          package: ./publish
          publish-profile: ${{ secrets.AZURE_FUNCTIONS_PUBLISH_PROFILE }}