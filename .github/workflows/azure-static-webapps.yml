name: Deploy to Azure

on:
  push:
    branches: [master]

concurrency:
  group: swa-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
    
jobs:
  build_and_deploy_functions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Build & Publish
        run: dotnet publish functions/PortfolioFunctions/PortfolioFunctions.csproj -c Release -o ./publish

      - name: Deploy Functions
        uses: Azure/functions-action@v1
        with:
          app-name: cole-portfolio-functions
          package: ./publish

  build_and_deploy_swa:
    runs-on: ubuntu-latest
    needs: build_and_deploy_functions
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Static Web App
        uses: Azure/static-web-apps-deploy@v1
        env:
          VITE_ADMIN_PRINCIPAL_ID: ${{ secrets.VITE_ADMIN_PRINCIPAL_ID }}
          VITE_FUNCTIONS_BASE_URL: ${{ secrets.VITE_FUNCTIONS_BASE_URL }}
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ASHY_FLOWER_0D0F6A610 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: /client
          api_location: ""
          output_location: dist